<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fergus King Folio</title>

  <link rel="stylesheet" href="style.css"/>

  <script

<body>

  <div class="sidebar">

</div>

    <div class="nav-buttons">
